version: '3.8'

services:
  # The PostgreSQL Database
  db:
    image: postgres:15
    container_name: water_db
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: water_segmentation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: